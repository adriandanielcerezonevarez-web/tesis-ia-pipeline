# ============================================================
#  REPORTES DE CALIDAD IA (DIARIO / SEMANAL / MENSUAL)
#  Junta los reportes generados por la IA en el periodo elegido
#  y arma UN SOLO ZIP plano. Cada reporte va identificado con
#  dia y hora, como IMAGEN (.png) + markdown (.md). Si el reporte
#  fue corregido por la IA, incluye su version "-corregido".
#  Tesis: Diseno de un modelo de uso de IA en pipelines CI/CD
#  Autores: Arce Noboa Allison - Cerezo Nevarez Adrian
# ============================================================
name: "Reportes de Calidad IA (Diario/Semanal/Mensual)"

on:
  schedule:
    - cron: "0 12 * * *"   # DIARIO  - todos los dias 12:00 UTC (07:00 Ecuador)
    - cron: "0 12 * * 1"   # SEMANAL - cada lunes 12:00 UTC
    - cron: "0 12 1 * *"   # MENSUAL - el dia 1 de cada mes 12:00 UTC
  workflow_dispatch:
    inputs:
      periodo:
        description: "Periodo del reporte a descargar"
        type: choice
        default: semanal
        options:
          - diario
          - semanal
          - mensual

permissions:
  contents: read
  actions: read

jobs:
  empaquetar-reportes:
    name: "Empaquetar reportes de IA"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias para la imagen del reporte
        run: pip install matplotlib

      - name: Determinar el periodo y el rango de dias
        id: periodo
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PERIODO="${{ github.event.inputs.periodo }}"
          else
            case "${{ github.event.schedule }}" in
              "0 12 * * *") PERIODO="diario" ;;
              "0 12 * * 1") PERIODO="semanal" ;;
              "0 12 1 * *") PERIODO="mensual" ;;
              *)            PERIODO="semanal" ;;
            esac
          fi
          case "$PERIODO" in
            diario)  DIAS=1  ;;
            semanal) DIAS=7  ;;
            mensual) DIAS=30 ;;
            *)       DIAS=7  ;;
          esac
          echo "periodo=$PERIODO" >> "$GITHUB_OUTPUT"
          echo "dias=$DIAS" >> "$GITHUB_OUTPUT"
          echo "Periodo seleccionado: $PERIODO ($DIAS dias)"

      - name: Descargar los reportes de IA del periodo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIAS: ${{ steps.periodo.outputs.dias }}
        run: |
          set -e
          mkdir -p staging
          : > staging/manifest.txt
          DESDE=$(date -u -d "$DIAS days ago" +%Y-%m-%dT%H:%M:%SZ)
          echo "Buscando reportes desde: $DESDE"
          # Artefactos de analisis y de correccion, creados dentro del periodo
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" \
            --jq ".artifacts[]
                  | select(.name==\"reporte-analisis-ia\" or .name==\"reporte-analisis-ia-corregido\")
                  | select(.created_at >= \"$DESDE\")
                  | \"\(.id)|\(.created_at)|\(.name)\"" \
            > lista.txt || true
          if [ ! -s lista.txt ]; then
            echo "No hubo reportes de IA en el periodo."
          else
            while IFS='|' read -r ID CREATED NAME; do
              [ -z "$ID" ] && continue
              echo "Descargando artefacto #$ID ($NAME)"
              mkdir -p "staging/$ID"
              gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/$ID/zip" > "staging/$ID.zip" || true
              unzip -o -q "staging/$ID.zip" -d "staging/$ID" || true
              echo "$ID|$CREATED|$NAME" >> staging/manifest.txt
            done < lista.txt
          fi

      - name: Armar el ZIP de reportes (imagen + markdown, por dia y hora)
        run: |
          python scripts/empaquetar_reportes.py \
            --staging staging \
            --manifest staging/manifest.txt \
            --out "reportes-ia-${{ steps.periodo.outputs.periodo }}.zip" \
            --periodo "${{ steps.periodo.outputs.periodo }}"

      - name: Publicar el paquete descargable
        uses: actions/upload-artifact@v4
        with:
          name: reportes-ia-${{ steps.periodo.outputs.periodo }}-${{ github.run_id }}
          path: reportes-ia-${{ steps.periodo.outputs.periodo }}.zip
          retention-days: 90
