# ============================================================
#  AI CODE REVIEW — GitHub Actions Workflow
#  Tesis: Diseño de un modelo de uso de IA en pipelines CI/CD
#  Autor: Adrian Daniel Cerezo Nevarez
# ============================================================
name: "Análisis de Calidad de Código con IA"
on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  # JOB 1: Análisis estático tradicional
  analisis-tradicional:
    name: "Validación Estática (Linting + Tests)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Instalar dependencias del proyecto
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Ejecutar linter (flake8)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
      - name: Ejecutar pruebas unitarias
        run: |
          if [ -d tests ]; then
            pip install pytest
            pytest tests/ -v --tb=short || true
          else
            echo "No se encontro directorio de tests. Omitiendo pruebas unitarias."
          fi

  # JOB 2: Análisis de calidad con IA
  analisis-ia:
    name: "Análisis de Calidad con IA"
    runs-on: ubuntu-latest
    needs: analisis-tradicional
    if: always()
    outputs:
      resultado_ia: ${{ steps.analisis-ia.outputs.codigo_salida }}
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detectar archivos de código modificados
        id: archivos-modificados
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            ARCHIVOS=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          else
            ARCHIVOS=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files)
          fi
          EXTENSIONES="py|js|ts|jsx|tsx|java|go|rb|php|cs|cpp|c|h|swift|kt|rs"
          ARCHIVOS_CODIGO=$(echo "$ARCHIVOS" | grep -E "\.(${EXTENSIONES})$" | head -20 || true)
          if [ -z "$ARCHIVOS_CODIGO" ]; then
            echo "archivos_encontrados=false" >> $GITHUB_OUTPUT
            echo "lista_archivos=" >> $GITHUB_OUTPUT
          else
            LISTA=$(echo "$ARCHIVOS_CODIGO" | tr '\n' ' ' | xargs)
            echo "archivos_encontrados=true" >> $GITHUB_OUTPUT
            echo "lista_archivos=$LISTA" >> $GITHUB_OUTPUT
          fi
      - name: Configurar Python para el analizador IA
        if: steps.archivos-modificados.outputs.archivos_encontrados == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias del analizador IA
        if: steps.archivos-modificados.outputs.archivos_encontrados == 'true'
        run: pip install openai
      - name: Ejecutar análisis de calidad con IA
        if: steps.archivos-modificados.outputs.archivos_encontrados == 'true'
        id: analisis-ia
        continue-on-error: true
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          ARCHIVOS="${{ steps.archivos-modificados.outputs.lista_archivos }}"
          echo "Analizando: $ARCHIVOS"
          python scripts/ai_code_analyzer.py --output reporte-ia.md --json --umbral 7.0 $ARCHIVOS
          echo "codigo_salida=$?" >> $GITHUB_OUTPUT
      - name: Publicar reporte de IA en el Pull Request
        if: always() && github.event_name == 'pull_request' && steps.archivos-modificados.outputs.archivos_encontrados == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let reporte = '';
            try { reporte = fs.readFileSync('reporte-ia.md', 'utf8'); }
            catch (e) { reporte = 'No se pudo generar el reporte de analisis de IA.'; }
            if (reporte.length > 60000) reporte = reporte.substring(0, 60000) + '\n\n*[Reporte truncado]*';
            const { data: comentarios } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existente = comentarios.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Reporte de Analisis de Calidad de Codigo'));
            if (existente) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existente.id, body: reporte });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: reporte });
            }
      - name: Guardar reporte como artefacto
        if: always() && steps.archivos-modificados.outputs.archivos_encontrados == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: reporte-analisis-ia
          path: |
            reporte-ia.md
            reporte-ia.json
          retention-days: 30
      - name: Mensaje cuando no hay archivos de código
        if: steps.archivos-modificados.outputs.archivos_encontrados == 'false'
        run: echo "No se detectaron archivos de codigo. Se omite el analisis de IA."

  # JOB 3: Quality Gate (bloquea si la puntuación es < 7)
  quality-gate:
    name: "Quality Gate Final"
    runs-on: ubuntu-latest
    needs: [analisis-tradicional, analisis-ia]
    if: always()
    steps:
      - name: Evaluar resultado de todos los análisis
        run: |
          TRADICIONAL="${{ needs.analisis-tradicional.result }}"
          IA_RESULTADO="${{ needs.analisis-ia.outputs.resultado_ia }}"
          echo "Estatico: $TRADICIONAL | IA (0=apto,1=bloqueado): $IA_RESULTADO"
          if [ "$TRADICIONAL" == "failure" ]; then
            echo "El analisis estatico fallo."
            exit 1
          fi
          if [ "$IA_RESULTADO" == "1" ]; then
            echo "La IA detecto calidad insuficiente (< 7). Se bloquea el despliegue."
            exit 1
          fi
          echo "Todos los analisis pasaron. El codigo esta listo."

  # JOB 4: Despliegue automático (solo si el gate pasa)
  despliegue:
    name: "Despliegue Automático al VPS"
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Desplegar en el VPS por SSH (git pull + Docker)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: "20m"
          script: |
            set -e
            REPO=/root/tesis-ia-pipeline
            if [ ! -d "$REPO/.git" ]; then
              git clone https://github.com/adriandanielcerezonevarez-web/tesis-ia-pipeline.git "$REPO"
            fi
            cd "$REPO"
            git fetch origin main
            git reset --hard origin/main
            docker rm -f helpdesk helpdesk-prod helpdesk-staging 2>/dev/null || true
            cd "$REPO/helpdesk-deploy"
            docker compose up -d --build --remove-orphans
            docker image prune -f
            echo "Despliegue completado."
